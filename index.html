<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Corkboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#1e1c15}
    #wrap{display:flex;width:100vw;height:100vh;overflow:hidden}

    /* ── PANEL ── */
    #panel{width:300px;min-width:300px;background:#1c1a14;border-right:1px solid #2e2b1f;display:flex;flex-direction:column}
    #panel-header{padding:18px;border-bottom:1px solid #2e2b1f}
    #ph-eyebrow{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#6b6347;margin-bottom:5px}
    #ph-title{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:#c9b97a;line-height:1.3}
    #ph-sub{font-family:'Space Mono',monospace;font-size:10px;color:#4a4535;margin-top:4px;letter-spacing:0.03em}

    /* ── TABS ── */
    #tab-bar{display:flex;border-bottom:1px solid #2e2b1f;flex-shrink:0}
    .tab{flex:1;padding:10px 0;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4a4535;text-align:center;cursor:pointer;border:none;background:none;transition:color 0.15s,border-bottom 0.15s;border-bottom:2px solid transparent}
    .tab:hover{color:#7a6e3e}
    .tab.active{color:#c9b97a;border-bottom:2px solid #c9b97a}

    /* ── CARD ── */
    #card{flex:1;overflow-y:auto;padding:16px}
    #card::-webkit-scrollbar{width:3px}
    #card::-webkit-scrollbar-thumb{background:#2e2b1f}
    #card-empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
    #card-empty p{font-family:'Space Mono',monospace;font-size:11px;color:#3a3528;line-height:1.9}
    #card-content{display:none}
    #card-clan{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#7a6e3e;margin-bottom:6px}
    #card-name{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#d4c47e;line-height:1.3;margin-bottom:2px}
    #card-sub{font-family:'Space Mono',monospace;font-size:10px;color:#5a5240;margin-bottom:14px;letter-spacing:0.03em}
    #card-divider{height:1px;background:#2a2720;margin-bottom:14px;position:relative}
    #card-divider::after{content:'';position:absolute;left:0;top:0;width:40px;height:1px;background:#7a6e3e}
    #card-detail{font-family:'Special Elite',serif;font-size:12.5px;font-style:normal;color:#a89e72;line-height:1.85;margin-bottom:18px}
    #card-conn-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#4a4535;margin-bottom:8px}
    #card-conn-list{display:flex;flex-direction:column;gap:3px}
    .conn-pill{font-family:'Space Mono',monospace;font-size:10px;color:#7a6e3e;padding:5px 9px;border:1px solid #2a2720;background:#161410;cursor:pointer;text-align:left;letter-spacing:0.03em;transition:all 0.12s;border-radius:2px}
    .conn-pill:hover{border-color:#7a6e3e;color:#c9b97a;background:#1e1c14}

    /* ── MAIN AREA ── */
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

    /* ── WEB VIEW ── */
    #view-web{flex:1;position:relative;overflow:hidden;cursor:crosshair;background:#1e1c15}
    #board-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #sv{position:absolute;top:0;left:0;width:4000px;height:4000px;pointer-events:none}
    .nd{position:absolute;cursor:pointer}
    .ni{background:#171510;border:1px solid #2e2b1e;border-radius:2px;padding:9px 11px;width:136px;text-align:left;transition:border-color 0.15s;position:relative}
    .ni::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#2a2720}
    .ni:hover{border-color:#5a5240}
    .ni:hover::before{background:#7a6e3e}
    .ni.sel{border-color:#c9b97a}
    .ni.sel::before{background:#c9b97a}
    .pc .ni{border-color:#3a3420}
    .pc .ni::before{background:#4a4228}
    .pc .ni.sel{border-color:#c9b97a}
    .nn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#b8a96a;line-height:1.4}
    .ns{font-family:'Space Mono',monospace;font-size:9px;color:#4a4535;margin-top:3px;letter-spacing:0.04em;text-transform:uppercase}
    #hint{position:absolute;bottom:14px;right:14px;font-family:'Space Mono',monospace;font-size:9px;color:#2a2720;letter-spacing:0.06em;text-transform:uppercase;pointer-events:none}

    /* ── TIMELINE VIEW ── */
    #view-timeline{flex:1;display:none;flex-direction:column;overflow:hidden;background:#1e1c15;position:relative}
    #tl-track-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;overflow:hidden;position:relative;padding:0 60px}
    #tl-scroll{overflow-x:auto;overflow-y:hidden;padding:40px 0 30px;cursor:grab;user-select:none}
    #tl-scroll::-webkit-scrollbar{height:3px}
    #tl-scroll::-webkit-scrollbar-thumb{background:#2e2b1f}
    #tl-scroll.grabbing{cursor:grabbing}
    #tl-inner{position:relative;height:160px;white-space:nowrap;display:inline-flex;align-items:center;padding:0 80px}

    /* spine */
    #tl-line{position:absolute;top:50%;left:0;right:0;height:1px;background:#2a2720;transform:translateY(-50%)}
    #tl-line::before{content:'';position:absolute;left:0;top:-1px;width:60px;height:3px;background:linear-gradient(90deg,#1e1c15,#2a2720)}
    #tl-line::after{content:'';position:absolute;right:0;top:-1px;width:60px;height:3px;background:linear-gradient(270deg,#1e1c15,#2a2720)}

    /* event markers */
    .tl-event{position:relative;display:inline-flex;flex-direction:column;align-items:center;margin:0 36px;cursor:pointer;flex-shrink:0}
    .tl-event.above .tl-label{bottom:calc(50% + 22px);top:auto}
    .tl-event.below .tl-label{top:calc(50% + 22px);bottom:auto}
    .tl-dot{width:10px;height:10px;border-radius:50%;background:#2e2b1e;border:1px solid #4a4535;transition:all 0.15s;position:relative;z-index:2;flex-shrink:0}
    .tl-event:hover .tl-dot{background:#7a6e3e;border-color:#c9b97a}
    .tl-event.sel .tl-dot{background:#c9b97a;border-color:#c9b97a;box-shadow:0 0 8px rgba(201,185,122,0.4)}
    .tl-dot.cat-death{border-color:#8b3a3a;background:#3a1a1a}
    .tl-dot.cat-meeting{border-color:#3a5a8b;background:#1a2a3a}
    .tl-dot.cat-discovery{border-color:#3a7a4a;background:#1a3a1a}
    .tl-dot.cat-faction{border-color:#7a5a3a;background:#3a2a1a}
    .tl-dot.cat-embrace{border-color:#6a3a8b;background:#2a1a3a}
    .tl-event:hover .tl-dot.cat-death,.tl-event.sel .tl-dot.cat-death{background:#8b3a3a;border-color:#c97a7a}
    .tl-event:hover .tl-dot.cat-meeting,.tl-event.sel .tl-dot.cat-meeting{background:#3a5a8b;border-color:#7aaac9}
    .tl-event:hover .tl-dot.cat-discovery,.tl-event.sel .tl-dot.cat-discovery{background:#3a7a4a;border-color:#7ac98a}
    .tl-event:hover .tl-dot.cat-faction,.tl-event.sel .tl-dot.cat-faction{background:#7a5a3a;border-color:#c9aa7a}
    .tl-event:hover .tl-dot.cat-embrace,.tl-event.sel .tl-dot.cat-embrace{background:#6a3a8b;border-color:#aa7ac9}
    .tl-tick{position:absolute;top:50%;width:1px;height:14px;background:#2a2720;transform:translateY(-50%);z-index:1}
    .tl-label{position:absolute;width:110px;text-align:center;pointer-events:none}
    .tl-label-date{font-family:'Space Mono',monospace;font-size:8px;color:#4a4535;letter-spacing:0.08em;margin-bottom:3px}
    .tl-label-name{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:#7a6e3e;line-height:1.3;white-space:normal}
    .tl-event:hover .tl-label-name,.tl-event.sel .tl-label-name{color:#c9b97a}

    /* category legend */
    #tl-legend{display:flex;gap:16px;padding:12px 60px;border-top:1px solid #1a1810;flex-shrink:0}
    .tl-leg{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:8px;color:#3a3528;letter-spacing:0.06em;text-transform:uppercase}
    .tl-leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  </style>
</head>
<body>
<div id="wrap">

  <!-- PANEL -->
  <div id="panel">
    <div id="panel-header">
      <div id="ph-eyebrow">Case File 1968</div>
      <div id="ph-title">Washington, D.C.</div>
      <div id="ph-sub">Kindred web of influence</div>
    </div>
    <div id="tab-bar">
      <button class="tab active" id="tab-web" onclick="switchTab('web')">Web</button>
      <button class="tab" id="tab-timeline" onclick="switchTab('timeline')">Timeline</button>
    </div>
    <div id="card">
      <div id="card-empty"><p>Select any subject<br>to open their dossier.</p></div>
      <div id="card-content">
        <div id="card-clan"></div>
        <div id="card-name"></div>
        <div id="card-sub"></div>
        <div id="card-divider"></div>
        <div id="card-detail"></div>
        <div id="card-conn-label">Known associates</div>
        <div id="card-conn-list"></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- WEB -->
    <div id="view-web">
      <div id="board-canvas"><svg id="sv"></svg></div>
      <div id="hint">Drag to pan</div>
    </div>

    <!-- TIMELINE -->
    <div id="view-timeline">
      <div id="tl-track-wrap">
        <div id="tl-scroll">
          <div id="tl-inner">
            <div id="tl-line"></div>
            <!-- events injected by JS -->
          </div>
        </div>
      </div>
      <div id="tl-legend">
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#8b3a3a;border:1px solid #c97a7a"></div>Death</div>
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#6a3a8b;border:1px solid #aa7ac9"></div>Embrace</div>
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#3a5a8b;border:1px solid #7aaac9"></div>Meeting</div>
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#3a7a4a;border:1px solid #7ac98a"></div>Discovery</div>
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#7a5a3a;border:1px solid #c9aa7a"></div>Faction</div>
      </div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────
// NODES
// ─────────────────────────────────────────────
const nodes=[
  {id:'norman',name:'Norman Graves',clan:'Malkavian',sub:'PC — Pinkerton Enforcer',x:1100,y:910,pc:true,
   detail:`A Pinkerton enforcer who crushed labor movements in Detroit before his sire Embraced him for the fervor of it. His touchstone Hugh Mann died in a fire Norman unknowingly helped set on the Patron's orders. Now jobless and unraveling, he's hiding out at Amalek's — and Hugh's daughter Wu wants to know what really happened.`,
   conn:['sil','grayMan','amalek','jini','jupiter','tommy','elizUnknown','ganymede','odessaBright','wuMann']},

  {id:'jini',name:'Jini',clan:'Hecata',sub:'PC — Night Nurse',x:1281,y:1041,pc:true,
   detail:`A WWII war bride whose husband Andrew was lost in the Pacific, presumed dead. Her sire Dr. Giovanni Embraced her for her occult aptitude, and everything since has been in service of finding Andrew. She's just discovered the Hecata files compiled on his disappearance were stolen — almost certainly by a Nosferatu.`,
   conn:['drGiovanni','grayMan','amalek','norman','jupiter','tommy','antonioGhoul','eliDrum','agnetteVess']},

  {id:'amalek',name:'Amalek',clan:'Tremere',sub:'PC — Ex-SS Occultist',x:1212,y:1254,pc:true,
   detail:`An ex-SS occultist who bought his Embrace by smuggling Jews out of the collapsing Reich. A devout Noddist and a practicing diablerizer, he consumed Ganymede in full view of witnesses during a botched job. He's fled to his malkav Anton LaVey for cover while the FBI circles his mortal mask, Klaus Grossman.`,
   conn:['rabbiLevi','grayMan','thomasCrane','marcusWebb','eliDrum','elizUnknown','ganymede','norman','jini','jupiter','tommy','calvDuchamp','ehHoldings','antonLaVey','washington','buscemi']},

  {id:'jupiter',name:'Jupiter / Ira',clan:'Setite',sub:'PC — Cult Leader',x:988,y:1254,pc:true,
   detail:`A cold Setite predator running a New Age healing cult as a front for slow-burn Blood Bonding. Sent to DC by her sire Sam for a purpose she doesn't fully understand, she discovered and purged a planted infiltrator in her flock — who was later used, and killed, as a patsy for the coterie.`,
   conn:['sam','grayMan','norman','jini','amalek','tommy','calvDuchamp','ganymede']},

  {id:'tommy',name:'Tommy Fleet',clan:'Toreador',sub:'PC — Country Musician',x:919,y:1041,pc:true,
   detail:`A charismatic country star who built a career stealing music from underprivileged Black musicians. He lost control feeding on starlet Vera Lynn, staged it as a suicide attempt, and gaslit her into devotion that's curdling into a real Blood Bond. His charm is cracking under Celeste Beaumont's scrutiny, and he knows it.`,
   conn:['veraLynn','celesteBeaumont','grayMan','norman','jini','amalek','jupiter','calvDuchamp']},

  {id:'patron',name:'The Patron',clan:'Unknown',sub:'True identity unknown — never met',x:1100,y:454,
   detail:`The unseen blackmailer running the coterie through the Gray Man. No one has ever met this person, confirmed their clan, or even confirmed they're a single individual rather than a committee. Assembled the coterie by threat, escalated the jobs from surveillance to arson to assassination, and is, as far as anyone can tell, always watching.`,
   conn:['grayMan']},

  {id:'grayMan',name:'The Gray Man',clan:'Unknown',sub:'Intermediary for the Patron',x:1100,y:624,
   detail:`The Patron's calm, unreadable courier — the only face the coterie actually deals with. He delivers instructions, collects results, and disappears without ever slipping a name, a location, or a motive, his own or his employer's. Whether he's Kindred, ghoul, or something stranger is unconfirmed. He seems to find the work mildly tedious.`,
   conn:['norman','jini','amalek','jupiter','tommy','mattMercer','ehHoldings','patron']},

  {id:'sil',name:'Silas Mercer',clan:'Malkavian',sub:"Norman's sire (no relation to Matt Mercer)",x:1244,y:704,
   detail:`Norman's loud, abusive Malkavian sire — clinically insane, with a contempt for everyone operating below his impossible standards. He quietly reported Norman's blackmail situation to Pinkerton leadership, ostensibly to protect the institution. Norman doesn't know this yet. Sil is also the origin of the judgmental inner voice that haunts Norman's mind.`,
   conn:['norman']},

  {id:'rabbiLevi',name:'Rabbi Levi Morgenstern',clan:'Tremere',sub:"Amalek's sire",x:1285,y:1479,
   detail:`Amalek's sire — a Jewish vampire who survived the century with an actuarial, not cruel, relationship to what human life costs. Genuinely fatherly toward Amalek in a way that makes the control more insidious. He's warmed noticeably as Amalek edges toward real power, and doesn't yet know about the Noddism or the diablerie.`,
   conn:['amalek']},

  {id:'drGiovanni',name:'Dr. Giovanni',clan:'Hecata',sub:"Jini's sire",x:1522,y:1100,
   detail:`Jini's sire, a self-described Head of Pathology who was never a real doctor. Treats the sire bond as pure transaction — Jini is useful, so he keeps her. He's holding Reverend Drum's ghost and fetter, plus a price for the stolen Andrew files he hasn't named yet. He'll collect at maximum leverage.`,
   conn:['jini','eliDrum']},

  {id:'sam',name:'Sam',clan:'Setite',sub:"Jupiter's sire",x:750,y:1336,
   detail:`Jupiter's sire, an Egyptian antiquities dealer who's quietly run Setite influence games in DC since the late 1950s — longer than Jupiter knows. He sent her here pointed at something specific she hasn't figured out yet, and contacts her rarely, always with requests she fulfills to stay in his good graces.`,
   conn:['jupiter']},

  {id:'thomasCrane',name:'Thomas Crane',clan:'Tremere',sub:'Chantry representative',x:1403,y:1393,
   detail:`A warm, professorial Tremere with a dangerous fascination with diablerie. He recognized the diablerie signature in Calvin DuChamp's aura at the Anarch speech and wants what consuming a Kindred like that would give him. Traded a distraction for intel on Jupiter with Amalek at the Mercer funeral — the favor's still unresolved.`,
   conn:['amalek','eliDrum','calvDuchamp']},

  {id:'marcusWebb',name:'Marcus Webb',clan:'Brujah',sub:'Sheriff of DC',x:1510,y:1283,
   detail:`The Prince's unhurried, lethal Sheriff. Closed his investigation into Elias Drum's death in exchange for Amalek's promise of information on the blackmailer behind the coterie. That investigation is now creeping toward something far more dangerous than a single murder — and Amalek is the only one who knows just how close it's getting.`,
   conn:['amalek','odessaBright','eliDrum']},

  {id:'celesteBeaumont',name:'Celeste Beaumont',clan:'Toreador',sub:'Toreador Primogen',x:768,y:840,
   detail:`Toreador Primogen who's run DC's Elysium-gallery since before the Civil War. Tommy spilled the coterie's entire blackmail situation to her within twenty minutes of meeting. She surfaced the missing Nosferatu Primogen as a potential exploit, called in two favors from Tommy already, and is now summoning the whole coterie to her gallery.`,
   conn:['tommy','veraLynn','calvDuchamp','nosferatuPrimogen']},

  {id:'mattMercer',name:'Aldous Mercer',clan:'Ventrue',sub:'Camarilla Primogen, deceased',x:1309,y:525,
   detail:`A Camarilla Primogen whose assassination, amid the chaos of the MLK riots, brought the coterie together in the first place. He held DC's urban renewal contracts through mortal proxies and ghoul officials, and was quietly building a back-channel deal with Odessa Bright's reform faction to shore up his council seat.`,
   conn:['grayMan','eliDrum','odessaBright']},

  {id:'eliDrum',name:'Reverend Elias Drum',clan:'Ghoul',sub:"Mercer's manservant, deceased",x:1478,y:709,
   detail:`Mercer's ghoul manservant of thirty years, murdered by Amalek at the funeral as cover for Crane's disappearance upstairs. His was the only genuine grief in a room full of performance. His ghost is now bound to a fetter in Dr. Giovanni's custody — and it knows a great deal more than it's said.`,
   conn:['mattMercer','amalek','thomasCrane','marcusWebb','drGiovanni','jini']},

  {id:'odessaBright',name:'Odessa Bright',clan:'Brujah',sub:'Reform faction, DC',x:1711,y:1143,
   detail:`A young Brujah who never wanted to lead DC's reform faction and increasingly is doing it anyway. She attended Mercer's funeral despite having no right to be there, and was spotted by Amalek doing it. A pragmatist stuck dealing with people who barely tolerate her existence.`,
   conn:['marcusWebb','mattMercer','calvDuchamp']},

  {id:'calvDuchamp',name:'Calvin Duchamp',clan:'Brujah',sub:'West Coast Anarch',x:1688,y:931,
   detail:`An exiled West Coast Anarch organizer, building a coalition that's part ideology and part hunting ground. Came east after committing diablerie of his own — the threads still show in his aura. He identified EH Holdings as the real-estate front quietly demolishing buildings the Anarch movement could've used, and passed that intel to Amalek.`,
   conn:['celesteBeaumont','amalek','odessaBright','thomasCrane','ehHoldings']},

  {id:'ehHoldings',name:'EH Holdings',clan:'Mortal Proxy',sub:'Real estate front, Gray Man',x:991,y:1535,
   detail:`A shell company with no visible owners, buying up buildings in neighborhoods where Anarch organizing is taking root and quietly demolishing them before they can be used. The Patron's oldest known mortal asset. What EH stands for, and who actually signs the checks, remains a mystery.`,
   conn:['calvDuchamp','amalek','grayMan']},

  {id:'veraLynn',name:'Vera Lynn',clan:'Mortal',sub:"Starlet / Celeste's plant",x:679,y:1115,
   detail:`A rising session musician injured when Tommy fed on her — he staged it as a suicide attempt and gaslit her into believing it. Her devotion to him has only deepened since, helped by a homophobic misunderstanding about what she witnessed. Tommy's now floating the idea of siring her outright to lock it all down.`,
   conn:['tommy','celesteBeaumont']},

  {id:'elizUnknown',name:'Elizabeth ????',clan:'Thin-Blooded',sub:'Fate unknown',x:812,y:756,
   detail:`A thin-blooded drifter abducted by Amalek, Norman, and Tommy using Tommy's star power as bait. Amalek took her to his private room and she was never seen again. No one who was there has ever asked what happened to her, or seems to want to know.`,
   conn:['amalek','norman','tommy']},

  {id:'ganymede',name:'Ganymede',clan:'Caitiff (deceased)',sub:"Diablerized by Amalek",x:941,y:1656,
   detail:`Once one of Jupiter's most devoted flock, secretly sired by an unknown party and fed a false gospel meant to turn him against her. Jupiter caught the deception and locked him away — then he was used as a patsy in a staged attack and diablerized by Amalek in front of witnesses. He's dead.`,
   conn:['jupiter','amalek','norman']},

  {id:'antonioGhoul',name:'Antonio',clan:'Ghoul',sub:'Untethered, DC',x:1669,y:1000,
   detail:`A teenage Italian ghoul cut loose by his old master after a warehouse job went bad. Jini saved his life with her vitae, leaving him lightly Blood Bonded and increasingly smitten. He's mentioned, almost in passing, that his former master is a Nosferatu who lives in the sewers — he has no idea how significant that is.`,
   conn:['jini']},

  {id:'agnetteVess',name:'Agnette Vess',clan:'Hecata',sub:"Jini's Primogen",x:1441,y:852,
   detail:`Jini's exacting, composed Primogen within the Hecata, who clearly knows more than she lets on. Confirmed Jini's suspicion that the stolen Andrew files were taken by a Nosferatu, and ordered her to keep close watch on the Anarchs going forward. Didn't explain how she knew any of it.`,
   conn:['jini']},

  {id:'antonLaVey',name:'Anton LaVey',clan:'Malkavian',sub:"Amalek's malkav, whereabouts unknown",x:1144,y:1519,
   detail:`The Malkavian elder Amalek runs to in real crisis — less a father figure than a confessor with his own agenda. He performed the Rite of Innocence to mask Amalek's aura from scrutiny, at the cost of a child's life, in exchange for Amalek pushing DC further into Sabbat-flavored chaos. What he actually wants from that chaos is unclear.`,
   conn:['amalek']},

  {id:'washington',name:'Agent Washington',clan:'Mortal',sub:'FBI — hunting Amalek',x:1636,y:1461,
   detail:`A young, idealistic FBI agent assigned to the Amalek case. Still believes enough in the system, and in doing the right thing, that the right story told well could quietly turn him into an asset — without him ever fully realizing it's happened.`,
   conn:['amalek','buscemi']},

  {id:'buscemi',name:'Agent Buscemi',clan:'Mortal',sub:'FBI — hunting Amalek',x:1707,y:1321,
   detail:`A burnt-out FBI agent four years from retirement, punching the clock and greasy as they come. Probably crooked, definitely tired, and very likely bribable if the price and the cover story are convincing enough. Washington's senior partner on the Amalek case.`,
   conn:['amalek','washington']},

  {id:'wuMann',name:'Wu Mann',clan:'Mortal',sub:"Hugh Mann's daughter",x:956,y:704,pc:false,
   detail:`Hugh Mann's teenage daughter, convinced — correctly — that her father's death was arson rather than an accident. She tracked Norman down during his exile at Amalek's house and asked him directly to pass along anything he learns. She has no idea Norman was there the night it happened.`,

  {id:'nosferatuPrimogen',name:'Nosferatu Primogen',clan:'Nosferatu',sub:'Identity unknown — communicates only by missive',x:776,y:581,

// ─────────────────────────────────────────────
// WEB LOGIC
// ─────────────────────────────────────────────
const idMap={};
nodes.forEach(n=>idMap[n.id]=n);
const edgeSet=new Set(),edges=[];
nodes.forEach(n=>(n.conn||[]).forEach(t=>{
  const k=[n.id,t].sort().join('|');
  if(!edgeSet.has(k)){edgeSet.add(k);edges.push([n.id,t]);}
}));

let sel=null,px=-580,py=-580,panning=false,ps=null;
const webView=document.getElementById('view-web'),sv=document.getElementById('sv');

function ctr(n){
  const el=document.getElementById('n'+n.id);
  const w=el?el.offsetWidth:136,h=el?el.offsetHeight:52;
  return{x:n.x+px+w/2,y:n.y+py+h/2};
}
function drawEdges(){
  sv.innerHTML='';
  edges.forEach(([aid,bid])=>{
    const a=idMap[aid],b=idMap[bid];if(!a||!b)return;
    const ac=ctr(a),bc=ctr(b),hi=sel&&(aid===sel||bid===sel);
    const pcLink = a.pc && b.pc;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',ac.x);l.setAttribute('y1',ac.y);
    l.setAttribute('x2',bc.x);l.setAttribute('y2',bc.y);
    if(pcLink){
      l.setAttribute('stroke',hi?'#e3d5a0':'#9a8c54');
      l.setAttribute('stroke-width',hi?'3':'2.25');
      l.setAttribute('stroke-dasharray','none');
    } else {
      l.setAttribute('stroke',hi?'#c9b97a':'#2e2b1e');
      l.setAttribute('stroke-width',hi?'1.5':'1');
      l.setAttribute('stroke-dasharray',hi?'none':'3,5');
    }
    sv.appendChild(l);
  });
}
function drawNodes(){
  nodes.forEach(n=>{
    let el=document.getElementById('n'+n.id);
    if(!el){
      el=document.createElement('div');
      el.id='n'+n.id;
      el.className='nd'+(n.pc?' pc':'');
      el.innerHTML=`<div class="ni"><div class="nn">${n.name}</div><div class="ns">${n.clan}</div></div>`;
      el.addEventListener('click',()=>pickNode(n.id));
      document.getElementById('board-canvas').appendChild(el);
    }
    el.style.left=(n.x+px)+'px';
    el.style.top=(n.y+py)+'px';
    el.querySelector('.ni').classList.toggle('sel',n.id===sel);
  });
}
function pickNode(id){
  sel=id;
  const n=idMap[id];
  showCard(n.clan, n.name, n.sub, n.detail, n.conn||[], cid=>{
    const cn=idMap[cid];if(!cn)return null;
    return{label:cn.name,action:()=>pickNode(cid)};
  });
  drawNodes();drawEdges();
}
webView.addEventListener('mousedown',e=>{
  if(e.target.closest('.nd'))return;
  panning=true;ps={x:e.clientX-px,y:e.clientY-py};webView.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  if(!panning)return;
  px=e.clientX-ps.x;py=e.clientY-ps.y;drawNodes();drawEdges();
});
window.addEventListener('mouseup',()=>{panning=false;webView.style.cursor='crosshair';});

// ─────────────────────────────────────────────
// TIMELINE LOGIC
// ─────────────────────────────────────────────
const evMap={};
events.forEach(e=>evMap[e.id]=e);

function buildTimeline(){
  const inner=document.getElementById('tl-inner');
  // remove old event els
  inner.querySelectorAll('.tl-event').forEach(el=>el.remove());
  events.forEach((ev,i)=>{
    const above=i%2===0;
    const wrap=document.createElement('div');
    wrap.className='tl-event '+(above?'above':'below');
    wrap.id='tev'+ev.id;

    const LABEL_H=54; // px clearance from center spine to label
    const labelTop = above
      ? `bottom:${LABEL_H}px`
      : `top:${LABEL_H}px`;

    wrap.innerHTML=`
      <div class="tl-tick"></div>
      <div class="tl-dot cat-${ev.cat}"></div>
      <div class="tl-label" style="${labelTop}">
        <div class="tl-label-date">${ev.date}</div>
        <div class="tl-label-name">${ev.name}</div>
      </div>`;
    wrap.addEventListener('click',()=>pickEvent(ev.id));
    inner.appendChild(wrap);
  });
}

function pickEvent(id){
  // deselect previous
  document.querySelectorAll('.tl-event.sel').forEach(el=>el.classList.remove('sel'));
  document.getElementById('tev'+id).classList.add('sel');
  const ev=evMap[id];
  showCard(ev.cat.toUpperCase(), ev.name, ev.date, ev.detail, [], ()=>null);
}

// ─────────────────────────────────────────────
// SHARED CARD
// ─────────────────────────────────────────────
function showCard(clan, name, sub, detail, connIds, connResolver){
  document.getElementById('card-empty').style.display='none';
  document.getElementById('card-content').style.display='block';
  document.getElementById('card-clan').textContent=clan;
  document.getElementById('card-name').textContent=name;
  document.getElementById('card-sub').textContent=sub;
  document.getElementById('card-detail').textContent=detail;
  const cl=document.getElementById('card-conn-list');
  cl.innerHTML='';
  const label=document.getElementById('card-conn-label');
  if(connIds.length){
    label.style.display='block';
    connIds.forEach(cid=>{
      const resolved=connResolver(cid);
      if(!resolved)return;
      const pill=document.createElement('button');
      pill.className='conn-pill';
      pill.textContent=resolved.label;
      pill.onclick=resolved.action;
      cl.appendChild(pill);
    });
  } else {
    label.style.display='none';
  }
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('tab-web').classList.toggle('active', tab==='web');
  document.getElementById('tab-timeline').classList.toggle('active', tab==='timeline');
  document.getElementById('view-web').style.display = tab==='web' ? 'block' : 'none';
  document.getElementById('view-timeline').style.display = tab==='timeline' ? 'flex' : 'none';
  // reset card
  document.getElementById('card-empty').style.display='flex';
  document.getElementById('card-content').style.display='none';
  sel=null;
  if(tab==='web'){drawNodes();drawEdges();}
}

// ─────────────────────────────────────────────
// TIMELINE DRAG SCROLL
// ─────────────────────────────────────────────
const tlScroll=document.getElementById('tl-scroll');
let tlDragging=false,tlStartX=0,tlScrollLeft=0;
tlScroll.addEventListener('mousedown',e=>{
  if(e.target.closest('.tl-event'))return;
  tlDragging=true;tlStartX=e.pageX-tlScroll.offsetLeft;tlScrollLeft=tlScroll.scrollLeft;
  tlScroll.classList.add('grabbing');
});
window.addEventListener('mousemove',e=>{
  if(!tlDragging)return;
  const x=e.pageX-tlScroll.offsetLeft;
  tlScroll.scrollLeft=tlScrollLeft-(x-tlStartX);
});
window.addEventListener('mouseup',()=>{tlDragging=false;tlScroll.classList.remove('grabbing');});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildTimeline();
drawNodes();
setTimeout(drawEdges,60);
</script>
