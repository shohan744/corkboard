<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Corkboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:#1e1c15}
    #wrap{display:flex;width:100vw;height:100vh;overflow:hidden}

    /* ── PANEL ── */
    #panel{width:300px;min-width:300px;background:#1c1a14;border-right:1px solid #2e2b1f;display:flex;flex-direction:column}
    #panel-header{padding:18px;border-bottom:1px solid #2e2b1f}
    #ph-eyebrow{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#6b6347;margin-bottom:5px}
    #ph-title{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;color:#c9b97a;line-height:1.3}
    #ph-sub{font-family:'Space Mono',monospace;font-size:10px;color:#4a4535;margin-top:4px;letter-spacing:0.03em}

    /* ── TABS ── */
    #tab-bar{display:flex;border-bottom:1px solid #2e2b1f;flex-shrink:0}
    .tab{flex:1;padding:10px 0;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#4a4535;text-align:center;cursor:pointer;border:none;background:none;transition:color 0.15s,border-bottom 0.15s;border-bottom:2px solid transparent}
    .tab:hover{color:#7a6e3e}
    .tab.active{color:#c9b97a;border-bottom:2px solid #c9b97a}

    /* ── CARD ── */
    #card{flex:1;overflow-y:auto;padding:16px}
    #card::-webkit-scrollbar{width:3px}
    #card::-webkit-scrollbar-thumb{background:#2e2b1f}
    #card-empty{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:20px}
    #card-empty p{font-family:'Space Mono',monospace;font-size:11px;color:#3a3528;line-height:1.9}
    #card-content{display:none}
    #card-clan{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#7a6e3e;margin-bottom:6px}
    #card-name{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#d4c47e;line-height:1.3;margin-bottom:2px}
    #card-sub{font-family:'Space Mono',monospace;font-size:10px;color:#5a5240;margin-bottom:14px;letter-spacing:0.03em}
    #card-divider{height:1px;background:#2a2720;margin-bottom:14px;position:relative}
    #card-divider::after{content:'';position:absolute;left:0;top:0;width:40px;height:1px;background:#7a6e3e}
    #card-detail{font-family:'Special Elite',serif;font-size:12.5px;font-style:normal;color:#a89e72;line-height:1.85;margin-bottom:18px}
    #card-conn-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#4a4535;margin-bottom:8px}
    #card-conn-list{display:flex;flex-direction:column;gap:3px}
    .conn-pill{font-family:'Space Mono',monospace;font-size:10px;color:#7a6e3e;padding:5px 9px;border:1px solid #2a2720;background:#161410;cursor:pointer;text-align:left;letter-spacing:0.03em;transition:all 0.12s;border-radius:2px}
    .conn-pill:hover{border-color:#7a6e3e;color:#c9b97a;background:#1e1c14}

    /* ── MAIN AREA ── */
    #main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}

    /* ── WEB VIEW ── */
    #view-web{flex:1;position:relative;overflow:hidden;cursor:crosshair;background:#1e1c15}
    #board-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
    #sv{position:absolute;top:0;left:0;width:4000px;height:4000px;pointer-events:none}
    .nd{position:absolute;cursor:pointer}
    .ni{background:#171510;border:1px solid #2e2b1e;border-radius:2px;padding:9px 11px;width:136px;text-align:left;transition:border-color 0.15s;position:relative}
    .ni::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#2a2720}
    .ni:hover{border-color:#5a5240}
    .ni:hover::before{background:#7a6e3e}
    .ni.sel{border-color:#c9b97a}
    .ni.sel::before{background:#c9b97a}
    .pc .ni{border-color:#3a3420}
    .pc .ni::before{background:#4a4228}
    .pc .ni.sel{border-color:#c9b97a}
    .nn{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:#b8a96a;line-height:1.4}
    .ns{font-family:'Space Mono',monospace;font-size:9px;color:#4a4535;margin-top:3px;letter-spacing:0.04em;text-transform:uppercase}
    #hint{position:absolute;bottom:14px;right:14px;font-family:'Space Mono',monospace;font-size:9px;color:#2a2720;letter-spacing:0.06em;text-transform:uppercase;pointer-events:none}

    /* ── TIMELINE VIEW ── */
    #view-timeline{flex:1;display:none;flex-direction:column;overflow:hidden;background:#1e1c15;position:relative}
    #tl-track-wrap{flex:1;display:flex;flex-direction:column;justify-content:center;overflow:hidden;position:relative;padding:0 60px}
    #tl-scroll{overflow-x:auto;overflow-y:hidden;padding:40px 0 30px;cursor:grab;user-select:none}
    #tl-scroll::-webkit-scrollbar{height:3px}
    #tl-scroll::-webkit-scrollbar-thumb{background:#2e2b1f}
    #tl-scroll.grabbing{cursor:grabbing}
    #tl-inner{position:relative;height:160px;white-space:nowrap;display:inline-flex;align-items:center;padding:0 80px}

    /* spine */
    #tl-line{position:absolute;top:50%;left:0;right:0;height:1px;background:#2a2720;transform:translateY(-50%)}
    #tl-line::before{content:'';position:absolute;left:0;top:-1px;width:60px;height:3px;background:linear-gradient(90deg,#1e1c15,#2a2720)}
    #tl-line::after{content:'';position:absolute;right:0;top:-1px;width:60px;height:3px;background:linear-gradient(270deg,#1e1c15,#2a2720)}

    /* event markers */
    .tl-event{position:relative;display:inline-flex;flex-direction:column;align-items:center;margin:0 36px;cursor:pointer;flex-shrink:0}
    .tl-event.above .tl-label{bottom:calc(50% + 22px);top:auto}
    .tl-event.below .tl-label{top:calc(50% + 22px);bottom:auto}
    .tl-dot{width:10px;height:10px;border-radius:50%;background:#2e2b1e;border:1px solid #4a4535;transition:all 0.15s;position:relative;z-index:2;flex-shrink:0}
    .tl-event:hover .tl-dot{background:#7a6e3e;border-color:#c9b97a}
    .tl-event.sel .tl-dot{background:#c9b97a;border-color:#c9b97a;box-shadow:0 0 8px rgba(201,185,122,0.4)}
    .tl-dot.cat-death{border-color:#8b3a3a;background:#3a1a1a}
    .tl-dot.cat-meeting{border-color:#3a5a8b;background:#1a2a3a}
    .tl-dot.cat-discovery{border-color:#3a7a4a;background:#1a3a1a}
    .tl-dot.cat-faction{border-color:#7a5a3a;background:#3a2a1a}
    .tl-dot.cat-embrace{border-color:#6a3a8b;background:#2a1a3a}
    .tl-event:hover .tl-dot.cat-death,.tl-event.sel .tl-dot.cat-death{background:#8b3a3a;border-color:#c97a7a}
    .tl-event:hover .tl-dot.cat-meeting,.tl-event.sel .tl-dot.cat-meeting{background:#3a5a8b;border-color:#7aaac9}
    .tl-event:hover .tl-dot.cat-discovery,.tl-event.sel .tl-dot.cat-discovery{background:#3a7a4a;border-color:#7ac98a}
    .tl-event:hover .tl-dot.cat-faction,.tl-event.sel .tl-dot.cat-faction{background:#7a5a3a;border-color:#c9aa7a}
    .tl-event:hover .tl-dot.cat-embrace,.tl-event.sel .tl-dot.cat-embrace{background:#6a3a8b;border-color:#aa7ac9}
    .tl-tick{position:absolute;top:50%;width:1px;height:14px;background:#2a2720;transform:translateY(-50%);z-index:1}
    .tl-label{position:absolute;width:110px;text-align:center;pointer-events:none}
    .tl-label-date{font-family:'Space Mono',monospace;font-size:8px;color:#4a4535;letter-spacing:0.08em;margin-bottom:3px}
    .tl-label-name{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;color:#7a6e3e;line-height:1.3;white-space:normal}
    .tl-event:hover .tl-label-name,.tl-event.sel .tl-label-name{color:#c9b97a}

    /* category legend */
    #tl-legend{display:flex;gap:16px;padding:12px 60px;border-top:1px solid #1a1810;flex-shrink:0}
    .tl-leg{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:8px;color:#3a3528;letter-spacing:0.06em;text-transform:uppercase}
    .tl-leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  </style>
</head>
<body>
<div id="wrap">

  <!-- PANEL -->
  <div id="panel">
    <div id="panel-header">
      <div id="ph-eyebrow">Case File 1968</div>
      <div id="ph-title">Washington, D.C.</div>
      <div id="ph-sub">Kindred web of influence</div>
    </div>
    <div id="tab-bar">
      <button class="tab active" id="tab-web" onclick="switchTab('web')">Web</button>
      <button class="tab" id="tab-timeline" onclick="switchTab('timeline')">Timeline</button>
      <button class="tab" id="tab-evidence" onclick="switchTab('evidence')">Evidence</button>
    </div>
    <div id="card">
      <div id="card-empty"><p>Select any subject<br>to open their dossier.</p></div>
      <div id="card-content">
        <div id="card-clan"></div>
        <div id="card-name"></div>
        <div id="card-sub"></div>
        <div id="card-divider"></div>
        <div id="card-detail"></div>
        <div id="card-conn-label">Known associates</div>
        <div id="card-conn-list"></div>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- WEB -->
    <div id="view-web">
      <div id="board-canvas"><svg id="sv"></svg></div>
      <div id="hint">Drag to pan</div>
    </div>

    <!-- TIMELINE -->
    <div id="view-timeline">
      <div id="tl-track-wrap">
        <div id="tl-scroll">
          <div id="tl-inner">
            <div id="tl-line"></div>
            <!-- events injected by JS -->
          </div>
        </div>
      </div>
      <div id="tl-legend">
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#8b3a3a;border:1px solid #c97a7a"></div>Death</div>
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#6a3a8b;border:1px solid #aa7ac9"></div>Embrace</div>
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#3a5a8b;border:1px solid #7aaac9"></div>Meeting</div>
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#3a7a4a;border:1px solid #7ac98a"></div>Discovery</div>
        <div class="tl-leg"><div class="tl-leg-dot" style="background:#7a5a3a;border:1px solid #c9aa7a"></div>Faction</div>
      </div>
    </div>

    <!-- EVIDENCE -->
    <div id="view-evidence" style="display:none; height:100%; overflow-y:auto; padding:24px; box-sizing:border-box;">
      <div id="ev-list" style="display:flex; flex-wrap:wrap; gap:16px; align-content:flex-start;"></div>
      <div id="ev-frame-wrap" style="display:none; height:calc(100% - 60px);">
        <button class="tab" onclick="closeEvidence()" style="margin-bottom:10px;">&larr; Back to evidence</button>
        <iframe id="ev-frame" style="width:100%; height:100%; border:1px solid #5a4a32; background:#23282e;"></iframe>
      </div>
    </div>

  </div>
</div>

<script>
// ─────────────────────────────────────────────
// NODES
// ─────────────────────────────────────────────
const nodes=[
  {id:'norman',name:'Norman Graves',clan:'Malkavian',sub:'PC — "Pinkerton Enforcer"',x:1100,y:910,pc:true,
   detail:`A "Pinkerton enforcer" who crushed labor movements in Detroit before his sire Embraced him for the fervor of it. His touchstone Hugh Mann died in a fire Norman unknowingly helped set on the Patron's orders. He clawed his Pinkerton job back with a cadaver Jini pried out of Dr. Giovanni, then burned Amalek's house to the ground for closure, mastering his vampiric fear of fire to do it. Hugh's daughter Wu still wants the truth he can't give her. The coterie has now witnessed what "the job" actually is: an abandoned sanitorium full of delusional Malkavians, with Norman and his sire genuinely believing they run a Pinkerton field office there. No one has told Norman what they saw. He still thinks he goes to work. And now something new: when an obfuscated assassin was subdued aboard the CONTROL flight north, Norman drank him dry — all the way dry. His first Amaranth, committed at altitude with Amalek at his shoulder encouraging him. Whatever he took in with the blood, he hasn't said.`,
   conn:['sil','grayMan','amalek','jini','jupiter','tommy','elizUnknown','ganymede','odessaBright','wuMann','drGiovanni','emily']},

  {id:'jini',name:'Jini',clan:'Hecata',sub:'PC — Night Nurse',x:1281,y:1041,pc:true,
   detail:`A WWII war bride whose husband Andrew was lost in the Pacific, presumed dead. Her sire Dr. Giovanni Embraced her for her occult aptitude, and everything since has been in service of finding Andrew, whose Hecata file was stolen, almost certainly by a Nosferatu. Now holding leverage of her own over Giovanni, she pried a convincing cadaver out of his pathology hold to buy Norman his job back, and traded vitae to Antonio for the sewer entrance where his old Nosferatu master once met him. That door opened onto a Nosferatu information hub, which delivered the answer she has organized her unlife around: Andrew is still alive. Where he is, and in what state, is the next question, and there is no world in which she does not go looking. Meanwhile Giovanni has escalated from threats to sabotage — her friend Susan warned her that he's spreading rumors at St. Mary's about stolen supplies and missed shifts. Susan also handed her a possible answer: Giovanni's conspicuous attention to the newest, prettiest nurse on staff might be blackmail material. And on the flight north, Jini watched Norman commit Amaranth at close range. She found herself less repelled than she expected. Curious, even.`,
   conn:['drGiovanni','grayMan','amalek','norman','jupiter','tommy','antonioGhoul','eliDrum','agnetteVess','control','susan']},

  {id:'amalek',name:'Amalek',clan:'Tremere',sub:'PC — Ex-SS Occultist',x:1212,y:1254,pc:true,
   detail:`An ex-SS occultist who bought his Embrace by smuggling Jews out of the collapsing Reich. A devout Noddist and a practicing diablerizer, he consumed Ganymede in front of witnesses and has been talking fast ever since. He crawled to his sire Rabbi Levi for a dressing-down and a storage-unit safehouse, sweet-talked a Sabbat pack out of a captive and a pack of Camarilla hounds out of a staking (both on the strength of his Marcus Webb back-channel), then cleared his valuables out of his old house. Hours later, Norman burned it down. Now ensconced in a suite at a prestigious 1968 hotel with a retainer and stable bagged blood coordinated through Jini, he's negotiated one more concession from CONTROL: his FBI tail disappears. His sire then sent him to deliver a bugged book to Thomas Crane; Amalek found the device, sliced the spine, and slipped in a note exposing Levi's deception. Crane rewarded the loyalty with a tour of his private laboratory — Noddist relics, a hidden cell — and something colder underneath: Crane was hunting his first diablerie, and Amalek was on the menu. Amalek talked his way off the plate by offering an easier target: Vera Lynn. Location, habits, and an introduction to Anton LaVey included. He walked out with Crane's gratitude and vintage blood. On the flight north he stood at Norman's shoulder during the Amaranth, encouraging.`,
   conn:['rabbiLevi','grayMan','thomasCrane','marcusWebb','eliDrum','elizUnknown','ganymede','norman','jini','jupiter','tommy','calvDuchamp','ehHoldings','antonLaVey','washington','buscemi','control']},

  {id:'jupiter',name:'Jupiter / Ira',clan:'Setite',sub:'PC — Cult Leader',x:988,y:1254,pc:true,
   detail:`A cold Setite predator running a New Age healing cult as a front for slow-burn Blood Bonding. Sent to DC by her sire Sam for a purpose she doesn't fully understand, she discovered and purged a planted infiltrator in her flock, who was later used and killed as a patsy for the coterie. A distraught Vera Lynn showed up at the cult in secret one night looking for solace; Jupiter didn't recognize whose girl she was at first, consoled her, and fed off her before sending her home. Vera left Tommy for real not long after. When Tommy confronted her at her Georgetown haven with his security detail, she called the cops and didn't flinch. On the drive back from the sewer, Tommy tried to lecture her about interfering with his property. She did not accept the framing.`,
   conn:['sam','grayMan','norman','jini','amalek','tommy','calvDuchamp','ganymede','veraLynn','control']},

  {id:'tommy',name:'Tommy Fleet',clan:'Toreador',sub:'PC — Country Musician',x:919,y:1041,pc:true,
   detail:`A charismatic country star who built a career stealing music from underprivileged Black musicians. He lost control feeding on starlet Vera Lynn, staged it as a suicide attempt, and gaslit her into devotion that's curdling into a real Blood Bond. The accidental Anarch-hero reputation he picked up at the metal show made him a Sabbat favorite. His sire has warned him plainly that Celeste Beaumont is not to be trusted. When Vera returned home shaken from a secret visit to Jupiter's cult, Tommy interrogated her, and in his rush to paint the cult as dangerous, revealed he knew far more about Jupiter than a jealous boyfriend ever should. Vera left him for good shortly after. He confronted Jupiter with a security detail; she called the cops. He now holds princely permission to sire Vera, negotiated as a boon from CONTROL — and he's rebuilt the bridge to use it. He tracked her performance schedule, met her after a set at a familiar nightclub, and spun the lawn confrontation as protectiveness: he knew Jupiter was dangerous, he came armed to keep Vera safe. Mollified but not fooled, Vera forgave him and reestablished the relationship. Then Tommy got on a plane to the Arctic, leaving her alone in DC — unaware that Amalek has since handed her location to a Tremere shopping for his first diablerie.`,
   conn:['veraLynn','celesteBeaumont','grayMan','norman','jini','amalek','jupiter','calvDuchamp','tommysSire','control']},

  {id:'patron',name:'The Patron',clan:'CONTROL leadership (suspected)',sub:'The face behind the blackmail',x:1100,y:454,
   detail:`The unseen figure running the coterie through the Gray Man. Now understood, in broad strokes, to be leadership within CONTROL, the Nosferatu-led coalition trying to head off nuclear war. Whether the Patron is a single Nosferatu (the missing Primogen who communicates only by missive being a very interesting candidate), a small council, or something stranger still, is unconfirmed. The blackmail arrangement has softened into cooperation with paid boons, but no one on the coterie side has forgotten who set the terms in the first place.`,
   conn:['grayMan','control','nosferatuPrimogen']},

  {id:'grayMan',name:'The Gray Man',clan:'CONTROL courier',sub:'Intermediary for the Patron',x:1100,y:624,
   detail:`The Patron's calm, unreadable courier and, by extension, CONTROL's front man to the coterie. He delivers instructions, collects results, and disappears without ever slipping a name, a location, or a motive. Whether he's Kindred, ghoul, or something stranger is still unconfirmed, though the odds now favor him being a Nosferatu asset or ghoul in the coalition's employ. He seems to find the work mildly tedious.`,
   conn:['norman','jini','amalek','jupiter','tommy','mattMercer','ehHoldings','patron','control']},

  {id:'sil',name:'Silas Mercer',clan:'Malkavian',sub:"Norman's sire (no relation to Matt Mercer)",x:1244,y:704,
   detail:`Norman's loud, abusive Malkavian sire, clinically insane, with contempt for anyone operating below his impossible standards. He genuinely believes he's a decorated Pinkerton detective running an active field office out of an abandoned sanitorium, and Norman believes it too. Neither is lying to the other. They're both mutually deluded, sharing a hallucinated version of a job that no one else can see. The reality, as the coterie now understands it, is closer to 'murderous hobos with a shared delusion of purpose.' Sil is also the origin of the judgmental inner voice that haunts Norman's mind.`,
   conn:['norman','emily']},

  {id:'rabbiLevi',name:'Rabbi Levi Morgenstern',clan:'Tremere',sub:"Amalek's sire",x:1285,y:1479,
   detail:`Amalek's sire — a Jewish vampire who survived the century with an actuarial, not cruel, relationship to what human life costs. Genuinely fatherly toward Amalek in a way that makes the control more insidious. When Amalek came to him in real trouble, he delivered a stern dressing-down and then, as ever, protected him — handing over a storage-unit facility he owns as a safehouse. He still may not grasp the full extent of the Noddism and diablerie he's sheltering.`,
   conn:['amalek']},

  {id:'drGiovanni',name:'Dr. Giovanni',clan:'Hecata',sub:"Jini's sire",x:1522,y:1100,
   detail:`Jini's sire, a self-described Head of Pathology who was never a real doctor. He treats the sire bond as pure transaction — and lately the transactions have turned petty. He's been quietly spreading rumors at St. Mary's that Jini steals supplies and flakes on shifts (things he himself asked her to do), a small cruelty aimed at her comfort and her hunting grounds, to remind her who is sire and who is childe. He's also been spending conspicuous time with the newest, youngest, prettiest nurse on staff — which Susan thinks could be leverage. He still holds Reverend Drum's ghost and fetter, and an unnamed price for the stolen Andrew files.`,
   conn:['jini','eliDrum','susan']},

  {id:'sam',name:'Sam',clan:'Setite',sub:"Jupiter's sire",x:750,y:1336,
   detail:`Jupiter's sire, an Egyptian antiquities dealer who's quietly run Setite influence games in DC since the late 1950s — longer than Jupiter knows. He sent her here pointed at something specific she hasn't figured out yet, and contacts her rarely, always with requests she fulfills to stay in his good graces.`,
   conn:['jupiter']},

  {id:'thomasCrane',name:'Thomas Crane',clan:'Tremere',sub:'Chantry rep — Sabbat convert',x:1403,y:1393,
   detail:`A warm, professorial Tremere whose fascination with diablerie has ripened into conviction. After Amalek twice proved himself trustworthy — most recently by exposing the listening device Rabbi Levi planted in a gifted book — Crane showed him his private laboratory: Noddist paraphernalia, occult apparatus, and a hidden prison cell built for a guest who won't be leaving. He believes nuclear hellfire will soon cleanse both human and Kindred society, and intends to be strong enough to dominate what's left. He was hunting his first diablerie, and Amalek could feel how close the invitation to 'drinks' came to being a banquet. Amalek redirected him toward an easier first course — Vera Lynn — handing over her cult refuge, Tommy's mansion, and an introduction to Anton LaVey. Crane repaid him in gratitude and vintage blood.`,
   conn:['amalek','eliDrum','calvDuchamp','rabbiLevi','antonLaVey','veraLynn']},

  {id:'marcusWebb',name:'Marcus Webb',clan:'Brujah',sub:'Sheriff of DC',x:1510,y:1283,
   detail:`The Prince's unhurried, lethal Sheriff. Closed his investigation into Elias Drum's death in exchange for Amalek's promise of information on the blackmailer behind the coterie. His name now does work he hasn't authorized — Amalek invoked their back-channel to wave a pack of his own hounds off the coterie. That investigation keeps creeping toward something far worse than a single murder.`,
   conn:['amalek','odessaBright','eliDrum']},

  {id:'celesteBeaumont',name:'Celeste Beaumont',clan:'Toreador',sub:'Toreador Primogen',x:768,y:840,
   detail:`Toreador Primogen who's run DC's Elysium-gallery since before the Civil War. Tommy spilled the coterie's entire blackmail situation to her within twenty minutes of meeting. She surfaced the missing Nosferatu Primogen as a potential exploit and has called in favor after favor from Tommy — but Tommy's own sire has now named her, flatly, as someone not to be trusted.`,
   conn:['tommy','veraLynn','calvDuchamp','nosferatuPrimogen','tommysSire']},

  {id:'mattMercer',name:'Aldous Mercer',clan:'Ventrue',sub:'Camarilla Primogen, deceased',x:1309,y:525,
   detail:`A Camarilla Primogen whose assassination, amid the chaos of the MLK riots, brought the coterie together in the first place. He held DC's urban renewal contracts through mortal proxies and ghoul officials, and was quietly building a back-channel deal with Odessa Bright's reform faction to shore up his council seat.`,
   conn:['grayMan','eliDrum','odessaBright']},

  {id:'eliDrum',name:'Reverend Elias Drum',clan:'Ghoul',sub:"Mercer's manservant, deceased",x:1478,y:709,
   detail:`Mercer's ghoul manservant of thirty years, murdered by Amalek at the funeral as cover for Crane's disappearance upstairs. His was the only genuine grief in a room full of performance. His ghost is now bound to a fetter in Dr. Giovanni's custody — and it knows a great deal more than it's said.`,
   conn:['mattMercer','amalek','thomasCrane','marcusWebb','drGiovanni','jini']},

  {id:'odessaBright',name:'Odessa Bright',clan:'Brujah',sub:'Reform faction, DC',x:1711,y:1143,
   detail:`A young Brujah who never wanted to lead DC's reform faction and increasingly is doing it anyway. She attended Mercer's funeral despite having no right to be there, and was spotted by Amalek doing it. A pragmatist stuck dealing with people who barely tolerate her existence.`,
   conn:['marcusWebb','mattMercer','calvDuchamp']},

  {id:'calvDuchamp',name:'Calvin Duchamp',clan:'Brujah',sub:'West Coast Anarch',x:1688,y:931,
   detail:`An exiled West Coast Anarch organizer, building a coalition that's part ideology and part hunting ground. Came east after committing diablerie of his own — the threads still show in his aura. He identified EH Holdings as the real-estate front quietly demolishing buildings the Anarch movement could've used, and passed that intel to Amalek.`,
   conn:['celesteBeaumont','amalek','odessaBright','thomasCrane','ehHoldings']},

  {id:'ehHoldings',name:'EH Holdings',clan:'Mortal Proxy',sub:'Real estate front, Gray Man',x:991,y:1535,
   detail:`A shell company with no visible owners, buying up buildings in neighborhoods where Anarch organizing is taking root and quietly demolishing them before they can be used. The Patron's oldest known mortal asset. What EH stands for, and who actually signs the checks, remains a mystery.`,
   conn:['calvDuchamp','amalek','grayMan']},

  {id:'veraLynn',name:'Vera Lynn',clan:'Mortal',sub:"Starlet / Celeste's plant",x:679,y:1115,
   detail:`A rising session musician injured when Tommy fed on her; he staged it as a suicide attempt and gaslit her into believing it. She fled to Jupiter's protection, but Tommy found her performance schedule and met her after a set with an explanation ready: he'd come to Jupiter's lawn armed because the cult was dangerous and he feared for her. Mollified but suspicious, addicted to his Lasting Kiss and exhausted by running, she forgave him and went back. She does not know Tommy holds princely permission to sire her. She does not know Amalek has sold her location, her habits, and her refuge to Thomas Crane as a first diablerie — a target that only works while she's mortal or newly turned. She is the most endangered person in Washington, and Tommy just left for the Arctic.`,
   conn:['tommy','celesteBeaumont','jupiter','thomasCrane']},

  {id:'elizUnknown',name:'Elizabeth ????',clan:'Thin-Blooded',sub:'Fate unknown',x:812,y:756,
   detail:`A thin-blooded drifter abducted by Amalek, Norman, and Tommy using Tommy's star power as bait. Amalek took her to his private room and she was never seen again. No one who was there has ever asked what happened to her, or seems to want to know.`,
   conn:['amalek','norman','tommy']},

  {id:'ganymede',name:'Ganymede',clan:'Caitiff (deceased)',sub:"Diablerized by Amalek",x:941,y:1656,
   detail:`Once one of Jupiter's most devoted flock, secretly sired by an unknown party and fed a false gospel meant to turn him against her. Jupiter caught the deception and locked him away — then he was used as a patsy in a staged attack and diablerized by Amalek in front of witnesses. He's dead.`,
   conn:['jupiter','amalek','norman']},

  {id:'antonioGhoul',name:'Antonio',clan:'Ghoul',sub:'Untethered, DC',x:1669,y:1000,
   detail:`A teenage Italian ghoul cut loose by his old master after a warehouse job went bad. Jini saved his life with her vitae, leaving him lightly Blood Bonded and increasingly smitten — smitten enough to trade away the sewer entrance where his old Nosferatu master once met him, in exchange for more of her blood. He still has no idea how significant that doorway might be.`,
   conn:['jini']},

  {id:'agnetteVess',name:'Agnette Vess',clan:'Hecata',sub:"Jini's Primogen",x:1441,y:852,
   detail:`Jini's exacting, composed Primogen within the Hecata, who clearly knows more than she lets on. Confirmed Jini's suspicion that the stolen Andrew files were taken by a Nosferatu, and ordered her to keep close watch on the Anarchs going forward. Didn't explain how she knew any of it.`,
   conn:['jini']},

  {id:'antonLaVey',name:'Anton LaVey',clan:'Malkavian',sub:"Amalek's malkav, whereabouts unknown",x:1144,y:1519,
   detail:`The Malkavian elder Amalek runs to in real crisis — less a father figure than a confessor with his own agenda. He performed the Rite of Innocence to mask Amalek's aura from scrutiny, at the cost of a child's life, in exchange for Amalek pushing DC further into Sabbat-flavored chaos. What he actually wants from that chaos is unclear.`,
   conn:['amalek']},

  {id:'washington',name:'Agent Washington',clan:'Mortal',sub:'FBI — hunting Amalek',x:1636,y:1461,
   detail:`A young, idealistic FBI agent assigned to the Amalek case. Still believes enough in the system, and in doing the right thing, that the right story told well could quietly turn him into an asset — without him ever fully realizing it's happened.`,
   conn:['amalek','buscemi']},

  {id:'buscemi',name:'Agent Buscemi',clan:'Mortal',sub:'FBI — hunting Amalek',x:1707,y:1321,
   detail:`A burnt-out FBI agent four years from retirement, punching the clock and greasy as they come. Probably crooked, definitely tired, and very likely bribable if the price and the cover story are convincing enough. Washington's senior partner on the Amalek case.`,
   conn:['amalek','washington']},

  {id:'wuMann',name:'Wu Mann',clan:'Mortal',sub:"Hugh Mann's daughter",x:956,y:704,pc:false,
   detail:`Hugh Mann's teenage daughter, convinced — correctly — that her father's death was arson rather than an accident. She tracked Norman down during his exile at Amalek's house and asked him directly to pass along anything he learns. She has no idea Norman was there the night it happened.`,
   conn:['norman']},

  {id:'nosferatuPrimogen',name:'Nosferatu Primogen',clan:'Nosferatu',sub:'Identity unknown — communicates only by missive',x:776,y:581,
   detail:`A Nosferatu power player no one in the local hierarchy has ever actually seen. Communicates entirely through delivered missives and somehow still holds the Prince's ear. Celeste surfaced his existence to the coterie as a potential exploit. Given what's now known about CONTROL, the "missing Primogen who moves the city by note" is a very plausible fit for the Patron; unconfirmed, but the shape of it is suggestive.`,
   conn:['celesteBeaumont','patron']},

  {id:'tommysSire',name:'Jerry Wexler',clan:'Toreador',sub:"Tommy's sire — music exec",x:600,y:910,
   detail:`A big-shot country music executive and Tommy's sire — a good ol' boy in a big hat and a long limousine, with the easy racism of a man who's never once been told no. The music industry is his hunting ground: a steady supply of hungry talent he can use, drain, and discard. He surfaced this week to warn Tommy, plainly, that Celeste Beaumont is not to be trusted — and shared nothing about how he'd know.`,
   conn:['tommy','celesteBeaumont']},

  {id:'emily',name:'Emily ????',clan:'Malkavian',sub:'Madness Network Fixture',x:1382,y:450,
   detail:`A young woman so deeply ingrained in the Malkavian madness network that she's barely comprehensible. Silas Mercer introduced her to the coterie as part of showing them his 'work' at the abandoned sanitorium — the place Norman insisted was his job, his purpose, his connection to something real. She dispensed cryptic hints and nonsense in equal measure. Whether she's a victim of the system or a key component of it remains unclear.`,
   conn:['sil','norman']},

  {id:'control',name:'CONTROL',clan:'Vampire Coalition (Nosferatu-led)',sub:'Anti-nuclear-war conspiracy',x:750,y:250,
   detail:`A coalition of Kindred, led primarily by the Nosferatu, dedicated to averting a nuclear war they believe CASCADE is engineering. The coterie has been blackmailed into working for them from the start; the Patron and the Gray Man are the operational face of this network. The sewer hub was one of their information nodes, staffed by Nosferatu and equipped with what looked like real intelligence infrastructure. Their working theory: certain elder Camarilla vampires (CASCADE) have decided that mid-20th-century human civilization is getting too organized, too networked, too technologically capable for the Masquerade to survive, and that a nuclear cull is the cleanest fix. CONTROL disagrees, and would rather live with humans than under them. In exchange for continued coterie cooperation on the Arctic broken arrow retrieval, CONTROL has paid three real boons: Amalek's FBI tail vanished, Tommy has princely permission to sire Vera, and Jini received confirmation that Andrew is still alive.`,
   conn:['grayMan','patron','cascade','amalek','tommy','jini','jupiter','norman']},

  {id:'cascade',name:'CASCADE',clan:'Camarilla Vampire Faction',sub:'Pro-nuclear-war conspiracy',x:1450,y:250,
   detail:`A faction of Camarilla vampires, per CONTROL's briefing, quietly pressuring the federal government toward a nuclear exchange with the Soviets. Their reasoning: human civilization is becoming too organized, too well-instrumented, too surveilled for the Masquerade to hold for another century. A nuclear cull rolls the clock back and preserves Kindred rule. They are also hunting the Arctic broken arrow; presumably to prevent CONTROL from having leverage over the crisis, or to fold the recovered warheads into their own plans. Membership, leadership, and organizational scope remain unknown, but the implication is that some of it sits inside the standing Camarilla hierarchy the coterie already deals with.`,
   conn:['control']},

  {id:'susan',name:'Susan',clan:'Mortal',sub:"Nurse at St. Mary's — Jini's friend",x:1620,y:970,
   detail:`A fellow nurse at St. Mary's and one of the few genuinely warm presences left in Jini's nights — a touchstone in the truest sense. Sharp-eyed and loyal, she pulled Jini aside to warn her that Dr. Giovanni was poisoning her reputation with rumors about stolen supplies and missed shifts. She also offered the antidote: Giovanni has been spending a great deal of time with the newest, youngest, prettiest nurse on staff, and a little leverage might get him off Jini's back. Susan thinks she's helping a friend navigate hospital politics. She has no idea what Giovanni is, or what her friend is either.`,
   conn:['jini','drGiovanni']},

  {id:'idira',name:'Idira',clan:'Tzimisce',sub:'CONTROL pilot',x:900,y:340,
   detail:`An androgynous French-American woman who forged her documentation — and concealed her gender — to fly bombing missions in the Second World War. The deception was discovered after the war, and she was sentenced to decades behind bars, until a particular visitor offered freedom in exchange for service with a new sort of unit. Embraced Tzimisce after her recruitment; whatever her face is now, it's the one she chose. A gambler down to her last chip, she flies CONTROL's northern routes with the calm of someone who has already seen the worst thing from ten thousand feet. When the assassin was found aboard, she didn't flinch. She's seen bodies before.`,
   conn:['control','phil']},

  {id:'phil',name:'Phil',clan:'Nosferatu',sub:'CONTROL technician',x:1300,y:340,
   detail:`A scrawny, bookish Nosferatu who was a nervous, solitary academic long before the Embrace — but whose empathy has always been boundless. When he was offered the chance to help save the world by doing the same quiet data analysis he was already doing, he accepted with knocking knees and flopsweat aplenty. Being turned into an undead abomination wasn't in the job description, but he's grown comfortable with invisibility and living in the dark. A high-humanity vampire, possibly the gentlest soul in CONTROL's employ, and the coterie's technician for securing and retrieving the device. The Amaranth aboard the flight horrified him. He didn't say so. He just went very quiet.`,
   conn:['control','idira']},
];

// ─────────────────────────────────────────────
// TIMELINE EVENTS
// ─────────────────────────────────────────────
const events=[
  {id:'ev0a', date:'1944', name:"Jini's Husband Lost", cat:'discovery',
   detail:`Jini's husband Andrew ships out to the Pacific during WWII and never returns — listed MIA, presumed dead. Decades before her Embrace, the loss becomes the organizing principle of her entire existence.`},

  {id:'ev0b', date:'1945', name:"Amalek Escapes the Reich", cat:'discovery',
   detail:`As the Reich collapses, a disillusioned Amalek strikes a deal with a Jewish vampire and helps smuggle Jews out of Germany. He's given power and the Embrace in return.`},

  {id:'ev0c', date:'1965', name:'Healing Beyond the Nine Founded', cat:'faction',
   detail:`Jupiter establishes her cult, Healing Beyond the Nine, in a bohemian corner of Georgetown — quietly recruiting believers years before the coterie ever forms.`},

  {id:'ev0d', date:'1965', name:"Tommy's First Album", cat:'faction',
   detail:`Tommy Fleet releases his debut album and becomes a country star overnight, riding music appropriated from Black musicians to an audience that has no idea where it came from.`},

  {id:'ev0e', date:'1967', name:'Norman Reassigned to DC', cat:'faction',
   detail:`Norman leaves Detroit, reassigned by the Pinkertons to clear DC's 'human refuse' in the name of urban renewal. He's already very good at the part of the job that involves crushing people.`},


  {id:'ev1', date:'Apr 04, 1968', name:'MLK Assassinated', cat:'faction',
   detail:`Dr. Martin Luther King Jr. is shot in Memphis. Washington DC erupts into riots — the city the coterie will soon operate in is already on fire before any of them have met.`},

  {id:'ev2', date:'Apr 06, 1968', name:'Death of Aldous Mercer', cat:'death',
   detail:`Camarilla Primogen Aldous Mercer is assassinated amid the chaos of the riots. The Prince's court has never satisfactorily explained the circumstances.`},

  {id:'ev3', date:'Apr 08, 1968', name:'The Envelopes', cat:'faction',
   detail:`Coded threat envelopes are delivered to five individuals through separate channels — each containing a surveillance target who turns out to be one of the others. This is how the coterie is assembled.`},

  {id:'ev4', date:'Apr 11, 1968', name:'Mercer Funeral', cat:'meeting',
   detail:`The coterie attends Mercer's funeral to spy on each other. Reverend Elias Drum is murdered by Amalek using Blood Sorcery, providing cover for Thomas Crane to slip upstairs unobserved.`},

  {id:'ev5', date:'Apr 13, 1968', name:'Findings Turned In', cat:'faction',
   detail:`The coterie reports their surveillance findings on each other to the Gray Man. Norman alone blows the assignment off as a joke — a decision that won't age well.`},

  {id:'ev6', date:'Apr 15, 1968', name:'The Death Certificate', cat:'discovery',
   detail:`Jini retrieves Drum's death certificate for Giovanni and discovers his ghost haunting it. She steals both the certificate and his fetter — and learns the Hecata file on Andrew has been stolen.`},

  {id:'ev7', date:'Apr 17, 1968', name:'Webb Back-Channel Opened', cat:'meeting',
   detail:`Amalek quietly opens a private back-channel with Sheriff Marcus Webb, behind the rest of the coterie's back. Neither mentions the arrangement to anyone else.`},

  {id:'ev8', date:'Apr 22, 1968', name:'First Job: The Fire', cat:'death',
   detail:`The coterie's first job: torch an apartment complex. Tommy injures starlet Vera Lynn feeding on her and stages it as self-harm, while Jupiter sets the blaze herself.`},

  {id:'ev9', date:'Apr 22, 1968', name:'Hugh Mann Dies', cat:'death',
   detail:`Norman returns to find his own home consumed in the fire. His touchstone Hugh Mann dies in the blaze, and Norman has a breakdown, then moves in with Amalek — homeless and unmoored.`},

  {id:'ev10', date:'Apr 28, 1968', name:'Second Job: The Bomb', cat:'faction',
   detail:`A new assignment: plant a car bomb and assassinate Calvin DuChamp. Separately, Jini is tasked with retrieving Drum's death certificate — work that overlaps the bomb plot in ways no one's noticed yet.`},

  {id:'ev11', date:'May 01, 1968', name:'The Hotel Job Goes Bad', cat:'meeting',
   detail:`Norman and Jini go to collect the bomb from a ghoul supplier and find the deal soured. They kill the attackers, save the ghoul (Antonio), and walk away with an unplanned dependent.`},

  {id:'ev12', date:'May 03, 1968', name:"Amalek's Warning", cat:'meeting',
   detail:`Amalek speaks with his sire, Rabbi Levi Morgenstern, who warns him to be careful. The warning will be ignored almost immediately.`},

  {id:'ev13', date:'May 05, 1968', name:'Elizabeth Taken', cat:'discovery',
   detail:`Using Tommy's star power as bait, Amalek, Norman, and Tommy abduct a thin-blooded drifter. Amalek takes her to his private room. She's never seen again, and no one asks why.`},

  {id:'ev14', date:'May 09, 1968', name:'Stakeout at the Church', cat:'discovery',
   detail:`The coterie stakes out the church where Calvin DuChamp is set to speak. Norman discovers Noddist paraphernalia among DuChamp's belongings — a detail no one quite knows what to do with yet.`},

  {id:'ev15', date:'May 10, 1968', name:'Tommy Strikes Out with Celeste', cat:'meeting',
   detail:`Tommy tries to probe Celeste Beaumont for information ahead of the DuChamp operation. It goes poorly — he offers a boon and gets nothing back.`},

  {id:'ev16', date:'May 11, 1968', name:'The Speech and the Bomb', cat:'faction',
   detail:`The night of DuChamp's speech, the bomb plot goes sideways: Jini is detained by a guard, Norman plants it anyway, a fight breaks out, and DuChamp escapes in a different vehicle.`},

  {id:'ev17', date:'Jun 05, 1968', name:'RFK Assassinated', cat:'faction',
   detail:`Senator Robert F. Kennedy is shot in Los Angeles. A congressional committee on assassinations forms in the aftermath, and DC's political temperature climbs further still.`},

  {id:'ev18', date:'Jun 07, 1968', name:'Vera Lynn Misreads Everything', cat:'embrace',
   detail:`Vera Lynn catches Tommy feeding on a man and mistakes it for intimacy, deepening her infatuation. In a homophobic society, the misunderstanding suits Tommy just fine.`},

  {id:'ev19', date:'Jun 09, 1968', name:'Cult Infiltration Discovered', cat:'discovery',
   detail:`Jupiter discovers that her flock member Ganymede was secretly sired and turned against her. She deals with it ruthlessly and locks the new fledgling away.`},

  {id:'ev20', date:'Jun 11, 1968', name:'The Missing Primogen', cat:'discovery',
   detail:`Celeste Beaumont interrupts a coterie meeting to reveal the Nosferatu Primogen is functionally missing — never seen, communicating only by missive, yet holding the Prince's ear regardless.`},

  {id:'ev21', date:'Jun 13, 1968', name:'Antonio Mentions His Master', cat:'discovery',
   detail:`Antonio begins following Jini around, making increasingly bold overtures. In the process, he mentions his former master — a Nosferatu who lives in the sewers.`},

  {id:'ev22', date:'Jun 15, 1968', name:'The Reflecting Pool Meeting', cat:'meeting',
   detail:`Calvin DuChamp meets Amalek at the reflecting pool. Amalek confesses to being Sabbat but denies diablerie, and DuChamp names EH Holdings as the firm buying up Anarch-friendly buildings. Jini overhears it all.`},

  {id:'ev23', date:'Jun 16, 1968', name:'Jini Reports to Agnette Vess', cat:'faction',
   detail:`Jini relays what she overheard to her Primogen, Agnette Vess, who orders her to keep watching the Anarchs — and confirms the stolen Andrew files were likely taken by a Nosferatu.`},

  {id:'ev24', date:'Jun 17, 1968', name:"Celeste's Favor Called", cat:'meeting',
   detail:`Celeste Beaumont calls Tommy and cashes in his outstanding favor: a performance to bolster a 'burgeoning young talent.' Tommy has no idea what he's walking into.`},

  {id:'ev25', date:'Jun 18, 1968', name:'The Patsy Plot', cat:'faction',
   detail:`Norman hatches a scheme to get his old job back, using Ganymede — Jupiter's imprisoned fledgling — as a patsy to pin the original arson on.`},

  {id:'ev26', date:'Jun 18, 1968', name:'Tommy at the Metal Show', cat:'meeting',
   detail:`Tommy plays a hostile metal show meant to humiliate him, wins the crowd against every odd, and cements an Anarch-hero reputation he never wanted.`},

  {id:'ev27', date:'Jun 18, 1968', name:'The Fake Attack Goes Wrong', cat:'death',
   detail:`The staged attack on Jupiter's cult unravels. Ganymede tries to flee, gets run down, and is diablerized by Amalek in front of witnesses. Norman and Amalek flee, leaving Jupiter to handle the fallout alone.`},

  {id:'ev28', date:'Jun 20, 1968', name:'Amalek Goes to Ground', cat:'faction',
   detail:`Suspicion falls heavily on Amalek despite his masks. He leaves town to consult his malkav, Anton LaVey, for a solution — while Norman haunts Amalek's empty house in self-imposed exile.`},

  {id:'ev28b', date:'Jun 20, 1968', name:'The Rite of Innocence', cat:'death',
   detail:`In exchange for Amalek pushing DC toward Sabbat chaos, Anton LaVey performs the Rite of Innocence on his behalf — a child-sacrifice ritual that masks Amalek's aura from supernatural scrutiny.`},

  {id:'ev29', date:'Jun 21, 1968', name:'Jini and Jupiter Compare Notes', cat:'meeting',
   detail:`Jini and Jupiter meet privately to discuss the Amalek situation. Both independently resolve not to trust him going forward.`},

  {id:'ev30', date:'Jun 23, 1968', name:'FBI Closes In', cat:'faction',
   detail:`FBI agents investigating Amalek encounter Jini and Jupiter outside his house. Jupiter slips and uses his true name instead of his mortal mask — and Tommy's home turns up under surveillance too.`},

  {id:'ev31', date:'Jun 24, 1968', name:"Wu Mann's Visit", cat:'discovery',
   detail:`During his exile at Amalek's house, Norman gets a visit from Wu Mann, Hugh's daughter, convinced the fire was arson. She asks him to pass along anything he learns.`},

  {id:'ev32', date:'Jun 25, 1968', name:'The Gallery Invitation', cat:'meeting',
   detail:`Celeste calls to congratulate Tommy and promises to raise the idea of siring Vera Lynn with the council — for another favor — then summons the whole coterie to her gallery.`},

  {id:'ev33', date:'Jun 26, 1968', name:"Amalek's Sire Reins Him In", cat:'meeting',
   detail:`Cornered and exposed, Amalek calls his sire Rabbi Levi Morgenstern and weathers a furious dressing-down. Levi protects him anyway, handing over a storage-unit facility he owns as a temporary safehouse.`},

  {id:'ev34', date:'Jun 26, 1968', name:'A Body for the Pinkertons', cat:'faction',
   detail:`Norman finally uses his head: he needs a convincing corpse to satisfy his bosses. Jini, working pathology and now holding leverage over Dr. Giovanni, secures a cadaver — and Norman buys his old Pinkerton job back with it.`},

  {id:'ev35', date:'Jun 27, 1968', name:"Shooed from Tommy's Door", cat:'meeting',
   detail:`The coterie converges on Tommy Fleet's house. He shoos them off immediately, pointing them at the venue he's promised Celeste he'll appear at — and pointedly gives them the location and nothing else.`},

  {id:'ev36', date:'Jun 27, 1968', name:'The Sabbat Warehouse', cat:'faction',
   detail:`The "venue" is an abandoned brick warehouse hosting a Sabbat party, not an art opening. The pack, mistaking Tommy for an Anarch hero, offers a captive vampire for him to consume; Amalek talks them into surrendering her as a prisoner instead. On the way out the coterie runs face-first into Camarilla hounds — and Amalek defuses them too, invoking Marcus Webb and giving up the captive as a "confused fledgling." They're let go, suspected but alive.`},

  {id:'ev37', date:'Jun 28, 1968', name:"Tommy's Sire's Warning", cat:'meeting',
   detail:`Tommy's sire pays him a visit and underlines, as if it needed saying, that Celeste Beaumont is not to be trusted. He offers the warning and little else about how he'd know.`},

  {id:'ev38', date:'Jun 28, 1968', name:'The Sewer Bargain', cat:'discovery',
   detail:`Jini strikes a deal with the smitten ghoul Antonio: more of her vitae in exchange for the sewer entrance where he once met his old Nosferatu master — a doorway that may lead straight toward the stolen Andrew files.`},

  {id:'ev39', date:'Jun 29, 1968', name:'Norman Burns It Down', cat:'death',
   detail:`Amalek quietly moves his most valuable possessions out of his old house. The same night, Norman — chasing closure for Hugh and mastering his vampiric fear of fire — douses Amalek's varnished floors in gasoline and pitches a molotov through the kitchen window. The house goes up.`},

  {id:'ev39a', date:'Jun 30, 1968', name:"Vera's Secret Cult Visit", cat:'meeting',
   detail:`Emotionally shredded by Tommy's inconsistent behavior but chemically hooked on his Lasting Kiss, Vera Lynn makes a secret visit to Healing Beyond the Nine looking for a balm for her soul. Jupiter, who doesn't recognize who she's running from at first, takes her in and consoles her. Before sending her home, Jupiter feeds off her.`},

  {id:'ev39b', date:'Jun 30, 1968', name:'Tommy Interrogates Vera', cat:'discovery',
   detail:`Vera returns to Tommy's mansion, shaken. Tommy interrogates her about where she's been and, rushing to paint the cult as dangerous, reveals he knows far more about Jupiter than a jealous boyfriend has any business knowing. Vera says nothing, and starts planning her exit.`},

  {id:'ev40', date:'Jul 01, 1968', name:'Amalek Finds Sanctuary', cat:'meeting',
   detail:`With Nosferatu connections clearing criminal charges tied to his mask's name, Amalek collects insurance money for the burned villa and secures a suite in a prestigious 1968 hotel. He hires a retainer and begins coordinating with Jini to establish a supply of bagged blood.`},

  {id:'ev41', date:'Jul 01, 1968', name:'Hospital Blood Run Goes Bad', cat:'discovery',
   detail:`Jini goes to the hospital blood supply to restock. She finds a guard posted in response to a recent break-in. The sign-out is routine, but her sire Dr. Giovanni's conversation is veiled and threatening — he makes clear that further independence from him will cost her his resources.`},

  {id:'ev42', date:'Jul 02, 1968', name:'Norman Visits "Pinkerton HQ"', cat:'meeting',
   detail:`Norman insists on showing the coterie his workplace and his sire. "Pinkerton HQ" turns out to be an abandoned sanitorium full of Malkavians in various states of delusion. Sil is not lying: he genuinely believes he runs a Pinkerton field office out of this building, and Norman believes it right along with him. Sil introduces the coterie to Emily, a young woman deeply ingrained in the madness network, nearly feral, dispensing cryptic hints and nonsense in equal measure. Amalek and Jupiter are quietly horrified. The 'job' that cost Amalek his home and Jupiter a cultist to protect is not a cover, not a conspiracy: it is a shared hallucination between a sire and his childe.`},

  {id:'ev43', date:'Jul 03, 1968', name:'Vera Abandons Tommy', cat:'discovery',
   detail:`Tommy returns to his mansion to find it empty of Vera. He discovers a letter hidden in her armoire: Jupiter has offered her succor and protection, and she's left just before his arrival. Furious and impulsive, Tommy rounds up his security detail.`},

  {id:'ev44', date:'Jul 03, 1968', name:'Tommy Confronts Jupiter', cat:'faction',
   detail:`Tommy appears on the lawn of Jupiter's Georgetown haven with his security detail, attempting to intimidate her into returning Vera. Jupiter stands her ground and simply calls the cops. Tommy backs off humiliated but vowing revenge — and without any real plan beyond his rage.`},

  {id:'ev45', date:'Jul 04, 1968', name:'The Ed Harvey Flier', cat:'discovery',
   detail:`Each member of the coterie receives a flier in the mail — seemingly targeted and suspicious. It's a vintage pest control advertisement for 'Ed Harvey's Pest Control,' offering to 'dominate the rodents.' A phone number and address are listed: 555-RODENT.`},

  {id:'ev46', date:'Jul 05, 1968', name:'The Number That Shouldn\'t Work', cat:'discovery',
   detail:`Jupiter calls 555-RODENT out of curiosity. The business shut down years ago — but the operator seems to know more than she should, and gives Jupiter an address before hanging up. No one discusses how she got a working line from a defunct business.`},

  {id:'ev47', date:'Jul 05, 1968', name:'The Cemetery Message', cat:'discovery',
   detail:`The coterie travels to the address: a lonely, overgrown cemetery. Within, they find a hollowed-out rock containing written instructions from CONTROL. A military plane went down in the Arctic carrying nuclear weapons — a broken arrow from the chrome dome. They are to assist in retrieval, with details encrypted in a cipher. CASCADE is also hunting the materials and will offer resistance.`},

  {id:'ev48', date:'Jul 06, 1968', name:'Cipher Cracked', cat:'discovery',
   detail:`Post-session, the coterie works the cipher and decrypts CONTROL's full instructions. The broken arrow is real. The scope of what they're being asked to do — on pain of who-knows-what from the unknown Patron — becomes clear.`},

  {id:'ev49', date:'Jul 07, 1968', name:'Into the Sewer', cat:'meeting',
   detail:`The coterie finally uses the sewer entrance Jini bought from Antonio, expecting to find one Nosferatu with answers about the stolen Andrew file. What they find is a functioning Nosferatu information hub: staff, infrastructure, dossiers. Antonio's old master turns out to be a node in a much larger network than any of them understood.`},

  {id:'ev50', date:'Jul 07, 1968', name:'CONTROL Reveals Itself', cat:'discovery',
   detail:`The Nosferatu at the hub name themselves: CONTROL, a coalition led primarily by their clan, dedicated to averting a nuclear war they believe CASCADE (a faction of Camarilla elders) is engineering to cull a human civilization growing too surveilled and organized to hide from. The Patron and the Gray Man have been CONTROL's operational face from the beginning. The coterie has been working for this coalition, under duress, since April.`},

  {id:'ev51', date:'Jul 07, 1968', name:'Three Boons Paid', cat:'faction',
   detail:`In exchange for continued cooperation on the Arctic broken arrow, CONTROL agrees to pay three real boons rather than lean on the blackmail: Amalek's FBI tail (Washington and Buscemi) is reassigned and vanishes, Tommy is granted princely permission to sire Vera Lynn, and Jini receives confirmation that Andrew is still alive. Coercion becomes something like partnership. The coterie is now in on the conspiracy by choice.`},

  {id:'ev52', date:'Jul 08, 1968', name:'The Ride Home', cat:'meeting',
   detail:`On the drive back from the sewer, Tommy tries to lecture Jupiter about interfering with his property. Jupiter, who has just walked out of the room where CONTROL confirmed the stakes of the wider game, does not accept the framing and bites back. Nothing is resolved. The temperature inside the coterie has not improved and now every internal grudge has to fit around a shared conspiracy that will not wait for them to sort it out.`},

  {id:'ev53', date:'Jul 09, 1968', name:"Susan's Warning", cat:'discovery',
   detail:`Jini's friend Susan pulls her aside at St. Mary's: Dr. Giovanni has been spreading rumors that Jini steals supplies and flakes on shifts — things he himself asked her to do. A petty jab at her comfort and her hunting grounds, a reminder of who is sire and who is childe. Susan has a suggestion, though: Giovanni has been spending a lot of time with the newest, youngest, prettiest nurse on staff. Perhaps a little blackmail could get him off Jini's case.`},

  {id:'ev54', date:'Jul 10, 1968', name:'The Book and the Bug', cat:'discovery',
   detail:`Rabbi Levi hands Amalek a simple task: deliver a book to Thomas Crane without revealing its origin, and keep whatever payment comes. Amalek inspects the gift first and finds a listening device planted in the spine. He slices the spine open and tucks a short missive inside the cover, laying out the deception. Whatever game Levi is playing against Crane, Amalek has just chosen a side — and it isn't his sire's.`},

  {id:'ev55', date:'Jul 10, 1968', name:"Crane's Laboratory", cat:'meeting',
   detail:`Crane reads the missive, secures the book out of earshot, and decides Amalek — twice now his benefactor — is trustworthy. He shows him the private laboratory: Noddist paraphernalia, occult apparatus, and a hidden prison cell. Crane has seen the writing on the wall. Nuclear hellfire will cleanse human and Kindred society alike, and he intends to be strong enough to dominate what's left. It is never said aloud, but Amalek can feel it: Crane is hunting his first diablerie, and this invitation to drinks could easily become a banquet with Amalek as the main course.`},

  {id:'ev56', date:'Jul 10, 1968', name:'An Easier Target', cat:'faction',
   detail:`Amalek talks his way off the menu by offering to stand WITH Crane — and suggests an easier first victim: a soon-to-be-embraced starlet, oblivious and vulnerable. Vera. He hands over the location of her cult refuge, Tommy's mansion, and the contact information for Anton LaVey, his malkuth, to better induct Crane into true Sabbat practice. In return: Crane's gratitude, and some of his vintage blood to help rebuild Amalek's supply.`},

  {id:'ev57', date:'Jul 11, 1968', name:'Tommy Wins Her Back', cat:'meeting',
   detail:`Tommy works his connections to find Vera's performance schedule and approaches her after a set at one of his most familiar nightclubs. He doesn't sweep her off her feet, but he offers an excuse for the lawn confrontation: he knows Jupiter is dangerous, and came armed with a posse to make sure Vera was safe. Mollified but suspicious, she forgives him and reestablishes the relationship. Days later, Tommy boards a plane for the Arctic and leaves her alone in DC.`},

  {id:'ev58', date:'Jul 12, 1968', name:'The Hangar', cat:'meeting',
   detail:`The coterie finally assembles at CONTROL's hangar and meets their crew: Idira, an androgynous Tzimisce who flew bombing missions in the war under a forged identity, and Phil, a scrawny, kind-eyed Nosferatu technician who will handle securing and retrieving the device. Wheels up for the far north.`},

  {id:'ev59', date:'Jul 12, 1968', name:'Assassin at Altitude', cat:'faction',
   detail:`Midflight, Jupiter notices something tumble from a shelf — no turbulence, no one nearby. An assassin, obfuscated, working his way toward the cockpit. The coterie manages to subdue the would-be killer before he can reach Idira. Someone knew about this flight. Someone knew the route, the plane, and the passenger list.`},

  {id:'ev60', date:'Jul 12, 1968', name:'The Amaranth', cat:'death',
   detail:`With the assassin subdued and the questions asked, Norman drinks him dry — all the way dry. His first diablerie, committed at ten thousand feet with Amalek at his shoulder, encouraging. Jini watches with an interest she didn't expect in herself. Phil goes very quiet. Whatever Norman took in with the blood, he hasn't shared it yet.`},
];

// EVIDENCE / PROPS
// Add discovered props here after each session.
// src can be an HTML prop page or an image in /props/.
// ─────────────────────────────────────────────
const evidence=[
  {id:'ed-harvey-flier', name:'The Ed Harvey Flier', found:'Delivered by mail to each coterie member — Jul 04, 1968',
   desc:'A vintage pest-control advertisement: "Dominate the Rodents!" The number, 555-RODENT, reached a business that shut down years ago — and an operator who knew more than she let on.',
   src:'props/ed-harvey-flier.png'},
  // Uncomment after the players discover it at the North Star site:
  // {id:'margaret-letter', name:'The Margaret Letter', found:'Command tent, North Star site',
  //  desc:'Personal correspondence recovered with Fox Seven\'s effects. A stiff gray card, cut with eleven small windows, was found separately on the body.',
  //  src:'props/margaret-letter.html'},
];

function buildEvidence(){
  const list=document.getElementById('ev-list');
  list.innerHTML='';
  if(!evidence.length){
    list.innerHTML='<div style="color:#8a8070; font-style:italic; font-size:13px;">No evidence has been catalogued yet.</div>';
    return;
  }
  evidence.forEach(ev=>{
    const el=document.createElement('div');
    el.style.cssText='width:230px; padding:14px 16px; background:#2e2a22; border:1px solid #5a4a32; cursor:pointer; transition:border-color 0.15s;';
    el.onmouseenter=()=>el.style.borderColor='#c9b97a';
    el.onmouseleave=()=>el.style.borderColor='#5a4a32';
    el.innerHTML=`<div style="font-size:13px; letter-spacing:1px; color:#c9b97a; margin-bottom:6px;">${ev.name}</div>
      <div style="font-size:10px; color:#8a8070; font-style:italic; margin-bottom:8px;">${ev.found}</div>
      <div style="font-size:11px; color:#a89878; line-height:1.5;">${ev.desc}</div>`;
    el.onclick=()=>openEvidence(ev.src);
    list.appendChild(el);
  });
}
function openEvidence(src){
  document.getElementById('ev-list').style.display='none';
  document.getElementById('ev-frame-wrap').style.display='block';
  document.getElementById('ev-frame').src=src;
}
function closeEvidence(){
  document.getElementById('ev-frame-wrap').style.display='none';
  document.getElementById('ev-frame').src='';
  document.getElementById('ev-list').style.display='flex';
}

// ─────────────────────────────────────────────
// WEB LOGIC
// ─────────────────────────────────────────────
const idMap={};
nodes.forEach(n=>idMap[n.id]=n);
const edgeSet=new Set(),edges=[];
nodes.forEach(n=>(n.conn||[]).forEach(t=>{
  const k=[n.id,t].sort().join('|');
  if(!edgeSet.has(k)){edgeSet.add(k);edges.push([n.id,t]);}
}));

let sel=null,px=-580,py=-580,panning=false,ps=null;
const webView=document.getElementById('view-web'),sv=document.getElementById('sv');

function ctr(n){
  const el=document.getElementById('n'+n.id);
  const w=el?el.offsetWidth:136,h=el?el.offsetHeight:52;
  return{x:n.x+px+w/2,y:n.y+py+h/2};
}
function drawEdges(){
  sv.innerHTML='';
  edges.forEach(([aid,bid])=>{
    const a=idMap[aid],b=idMap[bid];if(!a||!b)return;
    const ac=ctr(a),bc=ctr(b),hi=sel&&(aid===sel||bid===sel);
    const pcLink = a.pc && b.pc;
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',ac.x);l.setAttribute('y1',ac.y);
    l.setAttribute('x2',bc.x);l.setAttribute('y2',bc.y);
    if(pcLink){
      l.setAttribute('stroke',hi?'#e3d5a0':'#9a8c54');
      l.setAttribute('stroke-width',hi?'3':'2.25');
      l.setAttribute('stroke-dasharray','none');
    } else {
      l.setAttribute('stroke',hi?'#c9b97a':'#2e2b1e');
      l.setAttribute('stroke-width',hi?'1.5':'1');
      l.setAttribute('stroke-dasharray',hi?'none':'3,5');
    }
    sv.appendChild(l);
  });
}
function drawNodes(){
  nodes.forEach(n=>{
    let el=document.getElementById('n'+n.id);
    if(!el){
      el=document.createElement('div');
      el.id='n'+n.id;
      el.className='nd'+(n.pc?' pc':'');
      el.innerHTML=`<div class="ni"><div class="nn">${n.name}</div><div class="ns">${n.clan}</div></div>`;
      el.addEventListener('click',()=>pickNode(n.id));
      document.getElementById('board-canvas').appendChild(el);
    }
    el.style.left=(n.x+px)+'px';
    el.style.top=(n.y+py)+'px';
    el.querySelector('.ni').classList.toggle('sel',n.id===sel);
  });
}
function pickNode(id){
  sel=id;
  const n=idMap[id];
  showCard(n.clan, n.name, n.sub, n.detail, n.conn||[], cid=>{
    const cn=idMap[cid];if(!cn)return null;
    return{label:cn.name,action:()=>pickNode(cid)};
  });
  drawNodes();drawEdges();
}
webView.addEventListener('mousedown',e=>{
  if(e.target.closest('.nd'))return;
  panning=true;ps={x:e.clientX-px,y:e.clientY-py};webView.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  if(!panning)return;
  px=e.clientX-ps.x;py=e.clientY-ps.y;drawNodes();drawEdges();
});
window.addEventListener('mouseup',()=>{panning=false;webView.style.cursor='crosshair';});

// ─────────────────────────────────────────────
// TIMELINE LOGIC
// ─────────────────────────────────────────────
const evMap={};
events.forEach(e=>evMap[e.id]=e);

function buildTimeline(){
  const inner=document.getElementById('tl-inner');
  // remove old event els
  inner.querySelectorAll('.tl-event').forEach(el=>el.remove());
  events.forEach((ev,i)=>{
    const above=i%2===0;
    const wrap=document.createElement('div');
    wrap.className='tl-event '+(above?'above':'below');
    wrap.id='tev'+ev.id;

    const LABEL_H=54; // px clearance from center spine to label
    const labelTop = above
      ? `bottom:${LABEL_H}px`
      : `top:${LABEL_H}px`;

    wrap.innerHTML=`
      <div class="tl-tick"></div>
      <div class="tl-dot cat-${ev.cat}"></div>
      <div class="tl-label" style="${labelTop}">
        <div class="tl-label-date">${ev.date}</div>
        <div class="tl-label-name">${ev.name}</div>
      </div>`;
    wrap.addEventListener('click',()=>pickEvent(ev.id));
    inner.appendChild(wrap);
  });
}

function pickEvent(id){
  // deselect previous
  document.querySelectorAll('.tl-event.sel').forEach(el=>el.classList.remove('sel'));
  document.getElementById('tev'+id).classList.add('sel');
  const ev=evMap[id];
  showCard(ev.cat.toUpperCase(), ev.name, ev.date, ev.detail, [], ()=>null);
}

// ─────────────────────────────────────────────
// SHARED CARD
// ─────────────────────────────────────────────
function showCard(clan, name, sub, detail, connIds, connResolver){
  document.getElementById('card-empty').style.display='none';
  document.getElementById('card-content').style.display='block';
  document.getElementById('card-clan').textContent=clan;
  document.getElementById('card-name').textContent=name;
  document.getElementById('card-sub').textContent=sub;
  document.getElementById('card-detail').textContent=detail;
  const cl=document.getElementById('card-conn-list');
  cl.innerHTML='';
  const label=document.getElementById('card-conn-label');
  if(connIds.length){
    label.style.display='block';
    connIds.forEach(cid=>{
      const resolved=connResolver(cid);
      if(!resolved)return;
      const pill=document.createElement('button');
      pill.className='conn-pill';
      pill.textContent=resolved.label;
      pill.onclick=resolved.action;
      cl.appendChild(pill);
    });
  } else {
    label.style.display='none';
  }
}

// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function switchTab(tab){
  document.getElementById('tab-web').classList.toggle('active', tab==='web');
  document.getElementById('tab-timeline').classList.toggle('active', tab==='timeline');
  document.getElementById('tab-evidence').classList.toggle('active', tab==='evidence');
  document.getElementById('view-web').style.display = tab==='web' ? 'block' : 'none';
  document.getElementById('view-timeline').style.display = tab==='timeline' ? 'flex' : 'none';
  document.getElementById('view-evidence').style.display = tab==='evidence' ? 'block' : 'none';
  // reset card
  document.getElementById('card-empty').style.display='flex';
  document.getElementById('card-content').style.display='none';
  sel=null;
  if(tab==='web'){drawNodes();drawEdges();}
  if(tab==='evidence'){buildEvidence(); closeEvidence();}
}

// ─────────────────────────────────────────────
// TIMELINE DRAG SCROLL
// ─────────────────────────────────────────────
const tlScroll=document.getElementById('tl-scroll');
let tlDragging=false,tlStartX=0,tlScrollLeft=0;
tlScroll.addEventListener('mousedown',e=>{
  if(e.target.closest('.tl-event'))return;
  tlDragging=true;tlStartX=e.pageX-tlScroll.offsetLeft;tlScrollLeft=tlScroll.scrollLeft;
  tlScroll.classList.add('grabbing');
});
window.addEventListener('mousemove',e=>{
  if(!tlDragging)return;
  const x=e.pageX-tlScroll.offsetLeft;
  tlScroll.scrollLeft=tlScrollLeft-(x-tlStartX);
});
window.addEventListener('mouseup',()=>{tlDragging=false;tlScroll.classList.remove('grabbing');});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
buildTimeline();
drawNodes();
setTimeout(drawEdges,60);
</script>
